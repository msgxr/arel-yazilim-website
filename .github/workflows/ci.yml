name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Lint MUST pass before build
      - name: Lint
        run: pnpm --filter @arel/web lint
        env:
          CI: "true"

      # Type check MUST pass before build
      - name: Type check
        run: pnpm --filter @arel/web type-check

      # Generate Prisma client (needed for build even without a live DB)
      - name: Generate Prisma client
        run: pnpm --filter @arel/web db:generate

      # Build only runs if lint and type-check succeed
      - name: Build
        run: pnpm --filter @arel/web build
        env:
          GITHUB_ACTIONS: "true"
          NODE_ENV: production
          DATABASE_URL: "file:./dev.db"

